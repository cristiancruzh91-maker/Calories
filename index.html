<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra-Fit AI Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="UltraFit AI">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1043/1043322.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #070b14; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .accent-gradient { background: linear-gradient(135deg, #22d3ee 0%, #3b82f6 100%); }
        #camera-view { transform: scaleX(-1); border-radius: 2rem; }
        .scan-line { height: 2px; background: #22d3ee; box-shadow: 0 0 15px #22d3ee; position: absolute; width: 100%; top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto pb-32">

    <header class="flex justify-between items-center mb-6 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-cyan-400 italic">ULTRA-FIT <span class="text-white">PRO AI</span></h1>
            <p id="date-display" class="text-[10px] text-gray-500 uppercase font-bold tracking-widest"></p>
        </div>
        <div class="glass px-3 py-1 rounded-full text-[10px] font-bold text-green-400 border border-green-500/30">SYNC ACTIVE</div>
    </header>

    <div class="glass rounded-3xl p-5 mb-6 flex items-center justify-between shadow-lg">
        <div>
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Tu Peso (Xiaomi Sync)</p>
            <div class="flex items-baseline gap-1">
                <input id="peso-input" type="number" step="0.1" value="75.5" class="bg-transparent text-2xl font-bold w-20 focus:outline-none text-white">
                <span class="text-sm text-gray-500 font-bold">kg</span>
            </div>
        </div>
        <button onclick="syncMiFitness(this)" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 transition-all active:scale-95">
            <span>🔄 Sincronizar</span>
        </button>
    </div>

    <div id="scanner-container" class="relative hidden mb-6 overflow-hidden rounded-[2.5rem] glass border-2 border-cyan-500/50 shadow-2xl">
        <video id="camera-view" autoplay playsinline class="w-full h-72 object-cover"></video>
        <div class="scan-line"></div>
        <div class="absolute bottom-6 left-0 w-full flex justify-center">
            <button onclick="captureImage()" class="bg-white text-black font-black px-8 py-3 rounded-full text-xs uppercase tracking-widest shadow-2xl active:scale-90 transition-all">Capturar Plato</button>
        </div>
    </div>

    <div class="glass rounded-[2.5rem] p-8 text-center mb-6 relative overflow-hidden shadow-2xl">
        <div class="absolute top-0 left-0 w-full h-1 accent-gradient opacity-60"></div>
        <p class="text-gray-500 uppercase tracking-[0.2em] text-[10px] font-black mb-1">Calorías Restantes</p>
        <h2 id="cal-restantes" class="text-7xl font-black mb-4 tracking-tighter">2000</h2>
        <div class="w-full bg-gray-800 rounded-full h-2 mb-4">
            <div id="main-progress" class="accent-gradient h-2 rounded-full transition-all duration-700" style="width: 0%"></div>
        </div>
        <div class="flex justify-between text-[10px] font-bold uppercase text-gray-500">
            <span>Objetivo: <b id="cal-objetivo" class="text-white">2000</b></span>
            <span>Consumido: <b id="cal-consumidas" class="text-cyan-400">0</b></span>
        </div>
    </div>

    <div class="flex gap-2 mb-8 overflow-x-auto no-scrollbar py-2">
        <button onclick="setGoal('perder', this)" class="goal-btn accent-gradient px-6 py-2 rounded-full text-[10px] font-black uppercase shadow-lg shadow-cyan-500/20">🔥 Definición</button>
        <button onclick="setGoal('mantener', this)" class="goal-btn glass px-6 py-2 rounded-full text-[10px] font-black uppercase text-gray-400">⚖️ Mantener</button>
        <button onclick="setGoal('ganar', this)" class="goal-btn glass px-6 py-2 rounded-full text-[10px] font-black uppercase text-gray-400">💪 Volumen</button>
    </div>

    <button id="open-cam-btn" onclick="startScanner()" class="w-full mb-8 bg-white text-black p-5 rounded-[2rem] flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all font-black uppercase text-sm italic">
        <span class="text-2xl">📸</span> Escanear mi comida con IA
    </button>

    <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="glass p-4 rounded-2xl border-b-2 border-orange-500/50">
            <p class="text-[9px] text-gray-500 font-bold uppercase">Proteína</p>
            <p id="p-val" class="text-xl font-extrabold text-orange-400">0g</p>
            <div class="w-full bg-gray-800 h-1 mt-2 rounded-full"><div id="p-bar" class="bg-orange-400 h-1 rounded-full transition-all" style="width:0%"></div></div>
        </div>
        <div class="glass p-4 rounded-2xl border-b-2 border-cyan-500/50">
            <p class="text-[9px] text-gray-500 font-bold uppercase">Carbs</p>
            <p id="c-val" class="text-xl font-extrabold text-cyan-400">0g</p>
            <div class="w-full bg-gray-800 h-1 mt-2 rounded-full"><div id="c-bar" class="bg-cyan-400 h-1 rounded-full transition-all" style="width:0%"></div></div>
        </div>
        <div class="glass p-4 rounded-2xl border-b-2 border-pink-500/50">
            <p class="text-[9px] text-gray-500 font-bold uppercase">Grasas</p>
            <p id="g-val" class="text-xl font-extrabold text-pink-400">0g</p>
            <div class="w-full bg-gray-800 h-1 mt-2 rounded-full"><div id="g-bar" class="bg-pink-400 h-1 rounded-full transition-all" style="width:0%"></div></div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <div class="glass p-4 rounded-2xl flex justify-between items-center">
            <span class="text-[9px] font-black text-gray-500 uppercase italic">Fibra</span>
            <span id="fib-val" class="text-xs font-bold text-green-400">0g / 30g</span>
        </div>
        <div class="glass p-4 rounded-2xl flex justify-between items-center">
            <span class="text-[9px] font-black text-gray-500 uppercase italic">Sodio</span>
            <span id="sod-val" class="text-xs font-bold text-yellow-400">0mg</span>
        </div>
    </div>

    <div class="relative mb-8">
        <input id="search" type="text" placeholder="¿Qué has comido hoy? Ej: Pasta..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 focus:ring-2 focus:ring-cyan-500 text-white placeholder:text-gray-600 outline-none transition-all">
    </div>

    <div id="food-log" class="space-y-3">
        <h3 class="text-[10px] font-black text-gray-600 uppercase tracking-widest ml-2 mb-4 italic">Historial Diario</h3>
    </div>

    <script>
        // Base de Datos Ampliada
        const db = {
            "avena": {c: 389, p: 17, ch: 66, g: 7, fib: 10, sod: 2},
            "pollo": {c: 165, p: 31, ch: 0, g: 3, fib: 0, sod: 74},
            "salmon": {c: 208, p: 20, ch: 0, g: 13, fib: 0, sod: 59},
            "arroz": {c: 130, p: 3, ch: 28, g: 0.3, fib: 1, sod: 1},
            "huevo": {c: 155, p: 13, ch: 1.1, g: 11, fib: 0, sod: 124},
            "pasta": {c: 131, p: 5, ch: 25, g: 1.1, fib: 2, sod: 6},
            "aguacate": {c: 160, p: 2, ch: 9, g: 15, fib: 7, sod: 7},
            "pizza": {c: 266, p: 11, ch: 33, g: 10, fib: 2, sod: 598},
            "lentejas": {c: 116, p: 9, ch: 20, g: 0.4, fib: 8, sod: 2},
            "manzana": {c: 52, p: 0.3, ch: 14, g: 0.2, fib: 2, sod: 1}
        };

        let currentGoal = { cal: 2000, p: 150, c: 200, g: 60 };
        let consumed = { cal: 0, p: 0, ch: 0, g: 0, fib: 0, sod: 0 };
        let stream = null;

        // Función para cambiar objetivo
        function setGoal(type, btn) {
            if(type === 'perder') currentGoal = { cal: 1700, p: 170, c: 140, g: 50 };
            if(type === 'mantener') currentGoal = { cal: 2100, p: 150, c: 240, g: 60 };
            if(type === 'ganar') currentGoal = { cal: 2700, p: 190, c: 350, g: 75 };
            
            document.querySelectorAll('.goal-btn').forEach(b => {
                b.className = "goal-btn glass px-6 py-2 rounded-full text-[10px] font-black uppercase text-gray-400 transition-all";
            });
            btn.className = "goal-btn accent-gradient px-6 py-2 rounded-full text-[10px] font-black uppercase shadow-lg shadow-cyan-500/20 text-white transition-all";
            updateUI();
        }

        // Función de Cámara / Escáner
        async function startScanner() {
            const container = document.getElementById('scanner-container');
            const video = document.getElementById('camera-view');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                container.classList.remove('hidden');
                document.getElementById('open-cam-btn').classList.add('hidden');
            } catch (err) {
                alert("Activa la cámara para el escáner IA.");
            }
        }

        function captureImage() {
            const alimentos = Object.keys(db);
            const detectado = alimentos[Math.floor(Math.random() * alimentos.length)];
            addFood(detectado, db[detectado]);
            
            stream.getTracks().forEach(track => track.stop());
            document.getElementById('scanner-container').classList.add('hidden');
            document.getElementById('open-cam-btn').classList.remove('hidden');
        }

        // Simulación Sincronización Xiaomi
        function syncMiFitness(btn) {
            btn.innerText = "⏳ Sincronizando...";
            setTimeout(() => {
                const peso = (75 + Math.random()).toFixed(1);
                document.getElementById('peso-input').value = peso;
                btn.innerText = "✅ Hecho";
                btn.className = "bg-green-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all";
            }, 1200);
        }

        // Añadir Alimento
        function addFood(name, data) {
            consumed.cal += data.c;
            consumed.p += data.p;
            consumed.ch += data.ch;
            consumed.g += data.g;
            consumed.fib += data.fib;
            consumed.sod += data.sod;

            const item = document.createElement('div');
            item.className = "glass p-5 rounded-3xl flex justify-between items-center border-l-4 border-cyan-400 mb-3 animate-slide-in shadow-lg";
            item.innerHTML = `
                <div>
                    <p class="font-bold capitalize text-sm">${name}</p>
                    <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">P: ${data.p}g | C: ${data.ch}g | G: ${data.g}g</p>
                </div>
                <p class="font-black text-cyan-400">${data.c} <span class="text-[10px] text-gray-500">kcal</span></p>
            `;
            document.getElementById('food-log').after(item);
            updateUI();
        }

        // Actualizar Interfaz
        function updateUI() {
            document.getElementById('cal-objetivo').innerText = currentGoal.cal;
            document.getElementById('cal-consumidas').innerText = Math.round(consumed.cal);
            const rest = currentGoal.cal - consumed.cal;
            document.getElementById('cal-restantes').innerText = rest > 0 ? Math.round(rest) : 0;
            
            const pct = (consumed.cal / currentGoal.cal) * 100;
            document.getElementById('main-progress').style.width = Math.min(pct, 100) + '%';
            
            document.getElementById('p-val').innerText = Math.round(consumed.p) + 'g';
            document.getElementById('c-val').innerText = Math.round(consumed.ch) + 'g';
            document.getElementById('g-val').innerText = Math.round(consumed.g) + 'g';
            document.getElementById('fib-val').innerText = Math.round(consumed.fib) + 'g / 30g';
            document.getElementById('sod-val').innerText = Math.round(consumed.sod) + 'mg';

            document.getElementById('p-bar').style.width = Math.min((consumed.p/currentGoal.p)*100, 100) + '%';
            document.getElementById('c-bar').style.width = Math.min((consumed.ch/currentGoal.c)*100, 100) + '%';
            document.getElementById('g-bar').style.width = Math.min((consumed.g/currentGoal.g)*100, 100) + '%';
        }

        // Buscador
        document.getElementById('search').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = e.target.value.toLowerCase().trim();
                if(db[val]) { addFood(val, db[val]); e.target.value = ''; }
                else { alert("Prueba con: pollo, pasta, avena, aguacate, pizza..."); }
            }
        });

        // Fecha actual
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });

        updateUI();
    </script>
</body>
</html>
